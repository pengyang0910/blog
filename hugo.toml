baseURL = "https://pengyang.xyz/"
languageCode = "zh-cn"
title = "参商Parry"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true

# 分页配置
[pagination]
  pagerSize = 10

# 分类法配置 - 添加 series 系列文章分类
taxonomies = [
  {name = "tags", paginate = 10},
  {name = "series", paginate = 10}
]

# 启用搜索和标签功能所需的输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  # 外观设置
  defaultTheme = "auto"  # auto, light, dark
  disableThemeToggle = false
  
  # 主要内容分区（用于侧边栏最新文章）
  mainSections = ["blog", "knowledge_base", "projects"]
  
  # 文章功能
  ShowReadingTime = true
  ShowWordCount = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowRssButtonInSectionTermList = true
  
  # 目录设置
  ShowToc = true
  TocOpen = false
  
  # 首页设置
  ShowAllPagesInArchive = true
  ShowPageNums = true
  
  # 文章元信息
  DateFormat = "2006-01-02"
  ShowLastMod = true
  
  # 作者信息
  author = "Parry"
  description = "分享技术心得 | 记录学习历程 | 探索代码之美"
  
  # 页脚版权年份
  StartYear = 2026
  EndYear = 2026
  
  # 网站关键词（SEO）
  keywords = ["技术博客", "编程", "开发", "Hugo", "PaperMod"]
  
  # Favicon 配置
  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.ico"
    favicon32x32 = "/favicon.ico"
    apple_touch_icon = "/favicon.svg"
    safari_pinned_tab = "/favicon.svg"

  # 启用搜索功能
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 首页配置 - Home Info 模式（显示个人资料+文章列表）
[params.profileMode]
  enabled = false

[params.homeInfoParams]
  Title = "参商Parry"
  Content = "分享技术心得 | 记录学习历程 | 探索代码之美"
  AlignSocialIconsTo = "left"

# 社交图标（暂未配置）
# 如果以后需要添加社交链接，可以取消下面的注释并填入真实地址
# [[params.socialIcons]]
#   name = "github"
#   url = "https://github.com/yourusername"
# [[params.socialIcons]]
#   name = "email"
#   url = "mailto:your.email@example.com"

# 编辑建议链接（点击文章底部的编辑按钮）
[params.editPost]
  URL = "https://github.com/yourusername/blog/tree/main/content"
  Text = "建议修改"
  appendFilePath = true

# 评论系统配置
# 推荐使用 Giscus（基于 GitHub Discussions）
# 配置步骤：
# 1. 访问 https://giscus.app 获取配置参数
# 2. 将下面的参数替换为你的实际值
# 3. 将 enable 设置为 true
[params.giscus]
  enable = false  # 配置完成后改为 true
  repo = "yourusername/your-repo"
  repoId = "R_your_repo_id"
  category = "Comments"
  categoryId = "DIC_your_category_id"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "zh-CN"
  loading = "lazy"

# 其他评论系统（可选）
# [params.utterances]
#   enable = false
#   repo = "yourusername/your-repo"
#   issueTerm = "pathname"
#   theme = "preferred-color-scheme"
#   label = "💬 comment"

# [params.waline]
