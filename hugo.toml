#   dark = "auto"

# [params.disqus]
#   enable = false
#   shortname = "your-disqus-shortname"

# 统计和分析（可选）
# [params.analytics.google]
#   SiteVerificationTag = "XYZabc"
# [params.analytics.umami]
#   enable = true
#   website_id = "xxxx"
#   url = "https://analytics.example.com"

# 启用搜索页面
[[menu.main]]
  name = "🔍 搜索"
  url = "/search/"
  weight = 5

[menu]
  [[menu.main]]
    name = "📝 文章"
    url = "/blog/"
    weight = 10
  [[menu.main]]
    name = "📚 知识库"
    url = "/knowledge_base/"
    weight = 20
  [[menu.main]]
    name = "🚀 项目"
    url = "/projects/"
    weight = 30
  [[menu.main]]
    name = "📦 归档"
    url = "/archives/"
    weight = 40
  [[menu.main]]
    name = "👤 关于"
    url = "/about/"
    weight = 50

